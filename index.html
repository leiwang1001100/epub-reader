<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EPUB Reader + Library</title>

  <link rel="stylesheet" href="styles.css">

  <!-- Needed for file:// -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3/dist/epub.min.js"></script>
</head>
<body class="mode-library">
  <!-- File input off-screen but enabled -->
  <input id="importInput" type="file" accept=".epub" multiple />

  <!-- Sidebar -->
  <nav id="sidebar">
    <button class="sidebar-btn active" id="sideHome" title="All Books">🏠</button>
    <button class="sidebar-btn" id="sideCollections" title="Collections">📁</button>
  </nav>

  <header>
    <button id="toLibrary" class="btn-green" style="display:none;">← Library</button>
    <input id="searchBox" placeholder="Search text…" style="display:none;" />
    <span id="meta" class="small"></span>
    <span class="spacer"></span>
    <span id="status" class="small-badge"></span>
  </header>

  <!-- Library -->
  <div id="library">
    <div id="libToolbar">
      <button id="importBtn" class="btn-purple">Import EPUBs</button>
      <span class="small" id="libHint">Imported books are saved locally and appear here next time.</span>
      <span class="spacer"></span>
      <span class="small-badge" title="App version">v1.1.5</span>
    </div>
    <div id="grid"></div>
  </div>

  <!-- Collections view -->
  <div id="collectionsView">
    <div id="collectionsToolbar">
      <button id="newCollectionBtn" class="btn-green">＋ New Collection</button>
      <span class="small" id="collectionsHint">Organise your books into collections.</span>
      <span class="spacer"></span>
    </div>
    <div id="collectionsGrid"></div>
    <!-- Collection detail (books inside a collection) -->
    <div id="collectionDetail" style="display:none;">
      <div id="detailToolbar" style="display:flex;gap:8px;align-items:center;margin-bottom:12px;">
        <button id="backToCollections" class="btn-blue">← Collections</button>
        <span id="detailTitle" style="font-weight:700;font-size:18px;"></span>
        <span class="spacer"></span>
      </div>
      <div id="detailGrid" class="grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;"></div>
    </div>
  </div>

  <!-- Progress bar -->
  <div id="progressBar"><div id="progressFill"></div></div>
  <span id="progressLabel"></span>

  <!-- Reader -->
  <div id="viewer">
    <div id="split">
      <nav id="toc"></nav>
      <div id="rendition"></div>
    </div>
  </div>

  <div id="controls">
    <button id="prev" class="btn-blue">⬅️ Prev</button>
    <button id="next" class="btn-blue">Next ➡️</button>
    <button id="tocToggle" class="btn-green">Hide TOC</button>
    <button id="fontMinus" class="btn-orange">A−</button>
    <button id="fontPlus" class="btn-orange">A+</button>
    <button id="bgToggle" class="btn-purple">Background: Paper</button>
    <!-- scroll toggle appended if missing -->
  </div>

  <script>
    /********** IndexedDB **********/
    const DB_NAME='epubLibrary', DB_VERSION=2, STORE='books', COL_STORE='collections'; let db;
    function openDB(){
      if(db) return Promise.resolve(db);
      return new Promise((resolve,reject)=>{
      const req=indexedDB.open(DB_NAME,DB_VERSION);
      req.onupgradeneeded=(e)=>{
        const d=e.target.result;
        if(!d.objectStoreNames.contains(STORE)){
          const s=d.createObjectStore(STORE,{keyPath:'id'});
          try{ s.createIndex('createdAt','createdAt'); }catch{}
        }
        if(!d.objectStoreNames.contains(COL_STORE)){
          d.createObjectStore(COL_STORE,{keyPath:'id'});
        }
      };
      req.onsuccess=(e)=>{db=e.target.result;resolve(db);};
      req.onerror=(e)=>{ console.error('IndexedDB error:',e.target.error); reject(e.target.error); };
      req.onblocked=()=>{ console.warn('IndexedDB blocked — please close other tabs running this app.'); };
    });}
    function idbAddBook(record){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);tx.objectStore(STORE).put(record);});}
    function idbGetAll(){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly');const rq=tx.objectStore(STORE).getAll();rq.onsuccess=()=>res(rq.result||[]);rq.onerror=()=>rej(rq.error);});}
    function idbGet(id){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly');const rq=tx.objectStore(STORE).get(id);rq.onsuccess=()=>res(rq.result||null);rq.onerror=()=>rej(rq.error);});}
    function idbDelete(id){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(id);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}
    // Collections CRUD
    function idbAddCol(col){return new Promise((res,rej)=>{const tx=db.transaction(COL_STORE,'readwrite');tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);tx.objectStore(COL_STORE).put(col);});}
    function idbGetAllCols(){return new Promise((res,rej)=>{const tx=db.transaction(COL_STORE,'readonly');const rq=tx.objectStore(COL_STORE).getAll();rq.onsuccess=()=>res(rq.result||[]);rq.onerror=()=>rej(rq.error);});}
    function idbDeleteCol(id){return new Promise((res,rej)=>{const tx=db.transaction(COL_STORE,'readwrite');tx.objectStore(COL_STORE).delete(id);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}

    /********** Elements **********/
    const toLibraryBtn=document.getElementById('toLibrary');
    const importInput=document.getElementById('importInput');
    const importBtn=document.getElementById('importBtn');
    const libraryEl=document.getElementById('library');
    const gridEl=document.getElementById('grid');
    const libHint=document.getElementById('libHint');
    const collectionsView=document.getElementById('collectionsView');
    const collectionsGrid=document.getElementById('collectionsGrid');
    const newCollectionBtn=document.getElementById('newCollectionBtn');
    const collectionDetail=document.getElementById('collectionDetail');
    const detailGrid=document.getElementById('detailGrid');
    const detailTitle=document.getElementById('detailTitle');
    const backToCollections=document.getElementById('backToCollections');
    const sideHome=document.getElementById('sideHome');
    const sideCollections=document.getElementById('sideCollections');

    const viewerEl=document.getElementById('viewer');
    const tocEl=document.getElementById('toc');
    const metaEl=document.getElementById('meta');
    const searchBox=document.getElementById('searchBox');
    const prevBtn=document.getElementById('prev');
    const nextBtn=document.getElementById('next');
    const tocToggle=document.getElementById('tocToggle');
    const fontMinus=document.getElementById('fontMinus');
    const fontPlus=document.getElementById('fontPlus');
    const bgToggle=document.getElementById('bgToggle');
    const controls=document.getElementById('controls');
    const statusEl=document.getElementById('status');
    const progressBar=document.getElementById('progressBar');
    const progressFill=document.getElementById('progressFill');
    const progressLabel=document.getElementById('progressLabel');

    /********** State **********/
    let book, rendition, locations;
    let currentBookId=null;
    let _keyHandler=null;   // stored so we can remove it before re-adding
    let _resizeHandler=null; // stored so we can remove it before re-adding

    const bgModes=['paper','sepia','dark'];
    const BG_COLORS={paper:{bg:'#fdfaf3',fg:'#2b2b2b'},sepia:{bg:'#f4ecd8',fg:'#3b2f1a'},dark:{bg:'#111',fg:'#eee'}};

    // Persist font size and background preference across book opens
    let fontSize=parseInt(localStorage.getItem('epub_fontSize')||'100',10);
    let bgIdx=bgModes.indexOf(localStorage.getItem('epub_bgMode')||'paper');
    if(bgIdx<0) bgIdx=0;
    let tocVisible=true;

    /********** Utilities **********/
    function humanSize(bytes){const u=['B','KB','MB','GB'];let i=0,n=bytes;while(n>=1024&&i<u.length-1){n/=1024;i++;}return`${n.toFixed(n<10&&i>0?1:0)} ${u[i]}`;}
    function flashStatus(msg){statusEl.textContent=msg;setTimeout(()=>statusEl.textContent='',1400);}
    function normalizePath(path){path=path.split('#')[0].split('?')[0];const parts=path.split('/');const out=[];for(const p of parts){if(!p||p==='.')continue;if(p==='..')out.pop();else out.push(p);}return out.join('/');}
    function resolveRelative(src,baseHref){const baseDir=baseHref.includes('/')?baseHref.slice(0,baseHref.lastIndexOf('/')+1):'';return normalizePath(baseDir+src);}

    /********** Background **********/
    function setBackgroundForContents(contents,mode){
      const {bg,fg}=BG_COLORS[mode]||BG_COLORS.paper; const doc=contents.document; if(!doc)return;
      let style=doc.getElementById('bg-style');
      if(!style){style=doc.createElement('style');style.id='bg-style';doc.head.appendChild(style);}
      style.textContent=`html,body{background:${bg}!important;color:${fg}!important;}img,svg{max-width:100%;height:auto;}body{line-height:1.6;word-wrap:break-word;max-width:42rem;margin:auto;padding:2rem;}`;
    }
    function applyBackground(mode){
      if(!rendition)return;
      localStorage.setItem('epub_bgMode', mode);
      rendition.getContents().forEach(c=>setBackgroundForContents(c,mode));
      bgToggle.textContent=`Background: ${mode[0].toUpperCase()}${mode.slice(1)}`;
    }

    /********** Library **********/
    async function renderLibrary(){
      document.body.classList.add('mode-library');
      libraryEl.style.display='block';
      collectionsView.style.display='none';
      viewerEl.style.display='none';
      controls.style.display='none';
      toLibraryBtn.style.display='none';
      searchBox.style.display='none';
      importBtn.style.display='inline-block';
      progressBar.style.display='none';
      progressLabel.style.display='none';
      setSidebarActive('home');
      metaEl.textContent=''; statusEl.textContent='';

      const rows=(await idbGetAll()).sort((a,b)=>b.createdAt-a.createdAt);
      gridEl.innerHTML='';
      libHint.textContent = rows.length ? 'Books are saved locally in your browser.' : 'Tip: Click "Import EPUBs" to add books to your library.';

      for(const r of rows){
        const card=document.createElement('div'); card.className='card';
        const covWrap=document.createElement('div'); covWrap.className='coverWrap';
        const img=document.createElement('img'); img.className='cover';
        if(r.coverBlob) img.src=URL.createObjectURL(r.coverBlob); else img.alt='No cover';
        covWrap.appendChild(img);

        const meta=document.createElement('div'); meta.className='meta';
        const title=document.createElement('div'); title.className='title'; title.textContent=r.title||'Untitled'; title.title=r.title||'Untitled';
        const author=document.createElement('div'); author.className='author'; author.textContent=r.author||''; author.title=r.author||'';
        const small=document.createElement('div'); small.className='small';
        small.textContent=`${humanSize(r.size||0)} · Added ${new Date(r.createdAt).toLocaleDateString()}`;

        const row=document.createElement('div'); row.className='row';
        const openBtn=document.createElement('button'); openBtn.className='btn-blue'; openBtn.textContent=r.lastCfi?'Continue':'Read';
        openBtn.onclick=()=>openBookFromDB(r.id);
        const delBtn=document.createElement('button'); delBtn.className='btn-orange btn-icon'; delBtn.textContent='🗑️'; delBtn.title='Delete book';
        delBtn.onclick=async()=>{
          if(!confirm(`Delete "${r.title || 'this book'}"?\nThis cannot be undone.`)) return;
          await idbDelete(r.id); renderLibrary();
        };
        row.append(openBtn, delBtn);

        // ··· button pinned to top-right of card
        const moreBtn=document.createElement('button'); moreBtn.className='btn-more'; moreBtn.textContent='···';
        moreBtn.title='More options';
        moreBtn.onclick=(e)=>{ e.stopPropagation(); showMoreMenu(moreBtn, r, card); };

        meta.append(title,author,small,row);
        card.append(covWrap, meta, moreBtn);
        gridEl.appendChild(card);
      }
    }

    /********** Sidebar navigation **********/
    function setSidebarActive(view){
      sideHome.classList.toggle('active', view==='home');
      sideCollections.classList.toggle('active', view==='collections');
    }
    sideHome.onclick=async()=>{ await openDB(); collectionsView.style.display='none'; renderLibrary(); setSidebarActive('home'); };
    sideCollections.onclick=async()=>{ await openDB(); renderLibrary_hide(); renderCollections(); setSidebarActive('collections'); };

    function renderLibrary_hide(){
      libraryEl.style.display='none';
      document.body.classList.add('mode-library');
    }

    /********** Collections **********/
    async function renderCollections(){
      collectionsView.style.display='block';
      collectionDetail.style.display='none';
      collectionsGrid.style.display='grid';
      const [cols, books] = await Promise.all([idbGetAllCols(), idbGetAll()]);
      collectionsGrid.innerHTML='';
      if(cols.length===0){
        collectionsGrid.innerHTML='<p style="color:var(--muted)">No collections yet. Click <b>＋ New Collection</b> to create one.</p>';
        return;
      }
      for(const col of cols.sort((a,b)=>a.name.localeCompare(b.name))){
        const count=books.filter(b=>b.collectionId===col.id).length;
        const card=document.createElement('div'); card.className='col-card';
        const icon=document.createElement('div'); icon.className='col-icon'; icon.textContent='📁';
        const name=document.createElement('div'); name.className='col-name'; name.textContent=col.name;
        const cnt=document.createElement('div'); cnt.className='col-count'; cnt.textContent=`${count} book${count!==1?'s':''}`;
        const row=document.createElement('div'); row.className='row';
        const openBtn=document.createElement('button'); openBtn.className='btn-blue'; openBtn.textContent='Open';
        openBtn.onclick=(e)=>{ e.stopPropagation(); openCollectionDetail(col); };
        const delBtn=document.createElement('button'); delBtn.className='btn-orange'; delBtn.textContent='Delete';
        delBtn.onclick=async(e)=>{
          e.stopPropagation();
          if(!confirm(`Delete collection "${col.name}"?\nBooks will remain in your library.`)) return;
          // unassign all books in this collection
          const toUpdate=books.filter(b=>b.collectionId===col.id);
          await Promise.all(toUpdate.map(b=>{ b.collectionId=null; return idbAddBook(b); }));
          await idbDeleteCol(col.id);
          renderCollections();
        };
        row.append(openBtn, delBtn);
        card.append(icon, name, cnt, row);
        card.ondblclick=()=>openCollectionDetail(col);
        collectionsGrid.appendChild(card);
      }
    }

    async function openCollectionDetail(col){
      collectionDetail.style.display='block';
      collectionsGrid.style.display='none';
      detailTitle.textContent=`📁 ${col.name}`;
      detailGrid.innerHTML='';
      const books=(await idbGetAll()).filter(b=>b.collectionId===col.id).sort((a,b)=>b.createdAt-a.createdAt);
      if(!books.length){
        detailGrid.innerHTML='<p style="color:var(--muted)">No books in this collection yet.</p>';
        return;
      }
      for(const r of books){
        const card=document.createElement('div'); card.className='card';
        const covWrap=document.createElement('div'); covWrap.className='coverWrap';
        const img=document.createElement('img'); img.className='cover';
        if(r.coverBlob) img.src=URL.createObjectURL(r.coverBlob); else img.alt='No cover';
        covWrap.appendChild(img);
        const meta=document.createElement('div'); meta.className='meta';
        const title=document.createElement('div'); title.className='title'; title.textContent=r.title||'Untitled'; title.title=r.title||'Untitled';
        const author=document.createElement('div'); author.className='author'; author.textContent=r.author||''; author.title=r.author||'';
        const row=document.createElement('div'); row.className='row';
        const readBtn=document.createElement('button'); readBtn.className='btn-blue'; readBtn.textContent=r.lastCfi?'Continue':'Read';
        readBtn.onclick=()=>openBookFromDB(r.id);
        const removeBtn=document.createElement('button'); removeBtn.className='btn-orange'; removeBtn.textContent='Remove';
        removeBtn.onclick=async()=>{
          r.collectionId=null; await idbAddBook(r); openCollectionDetail(col);
        };
        row.append(readBtn, removeBtn);
        meta.append(title, author, row);
        card.append(covWrap, meta);
        detailGrid.appendChild(card);
      }
    }

    backToCollections.onclick=()=>{ collectionDetail.style.display='none'; collectionsGrid.style.display='grid'; renderCollections(); };

    newCollectionBtn.onclick=async()=>{
      const name=(prompt('Collection name:') || '').trim();
      if(!name) return;
      await idbAddCol({ id:crypto.randomUUID(), name, createdAt:Date.now() });
      renderCollections();
    };

    /********** More menu & collection picker on book cards **********/
    let activeMenu=null;
    function closeMenu(){ if(activeMenu){ activeMenu.remove(); activeMenu=null; } }
    document.addEventListener('click', (e)=>{ if(activeMenu && !activeMenu.contains(e.target)) closeMenu(); });

    async function showMoreMenu(btn, book, container){
      closeMenu();
      const cols=await idbGetAllCols();
      const menu=document.createElement('div'); menu.className='more-menu';
      menu.onclick=e=>e.stopPropagation();

      // Collection section header
      const hdr=document.createElement('div');
      hdr.style.cssText='padding:4px 14px;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;';
      hdr.textContent='Add to Collection';
      menu.appendChild(hdr);

      // "None" option
      const noneItem=document.createElement('div'); noneItem.className='more-menu-item'+(book.collectionId===null?' selected':'');
      if(book.collectionId===null) noneItem.style.color='#4f46e5';
      noneItem.innerHTML=`<span>🚫</span><span>None</span>`;
      noneItem.onclick=async()=>{ book.collectionId=null; await idbAddBook(book); closeMenu(); renderLibrary(); };
      menu.appendChild(noneItem);

      if(cols.length){
        for(const col of cols.sort((a,b)=>a.name.localeCompare(b.name))){
          const item=document.createElement('div'); item.className='more-menu-item';
          if(book.collectionId===col.id) item.style.color='#4f46e5';
          item.innerHTML=`<span>📁</span><span>${col.name}${book.collectionId===col.id?' ✓':''}</span>`;
          item.onclick=async()=>{ book.collectionId=col.id; await idbAddBook(book); closeMenu(); renderLibrary(); };
          menu.appendChild(item);
        }
      } else {
        const empty=document.createElement('div'); empty.className='more-menu-item';
        empty.style.color='var(--muted)'; empty.textContent='No collections yet';
        menu.appendChild(empty);
      }

      container.appendChild(menu);
      activeMenu=menu;
    }

    /********** Import **********/
    importBtn.onclick=()=>importInput.click();
    importInput.addEventListener('change', async ()=>{
      const files=Array.from(importInput.files||[]); if(!files.length)return;
      await openDB(); statusEl.textContent='Importing…';
      for(const f of files){
        const buf=await f.arrayBuffer();
        const rec=await extractBookRecord(buf,f.name,f.size);
        await idbAddBook(rec);
      }
      statusEl.textContent='';
      await renderLibrary();
      importInput.value='';
    });

    async function extractBookRecord(buf,filename,size){
      const b=ePub(buf,{openAs:'binary'}); await b.ready;
      const md=await b.loaded.metadata.catch(()=>({}));
      const title=md?.title || filename.replace(/\.epub$/i,'');
      const author=md?.creator || '';
      // Cover extraction
      let coverBlob=null;
      try{
        if(b.coverUrl){
          const url=await b.coverUrl();
          if(url?.startsWith('blob:')){ const res=await fetch(url); coverBlob=await res.blob(); }
          else if(url){ const file=b.archive?.zip?.file(url)||b.archive?.zip?.file(decodeURI(url)); if(file) coverBlob=await file.async('blob'); }
        }
        if(!coverBlob){
          const si=b.spine.spineItems[0];
          if(si){
            await si.load(b.load.bind(b));
            const doc=si.document; const img=doc&&doc.querySelector('img');
            if(img){
              const href=resolveRelative(img.getAttribute('src'),si.href);
              const file=b.archive?.zip?.file(href)||b.archive?.zip?.file(decodeURI(href));
              if(file) coverBlob=await file.async('blob');
            }
            await si.unload();
          }
        }
      }catch{}
      return { id:crypto.randomUUID(), title, author, size, createdAt:Date.now(), filename, bufBlob:new Blob([buf]), coverBlob, lastCfi:null };
    }

    /********** Reader **********/
    function clearTOC(){ tocEl.innerHTML=''; }
    function buildTOC(toc){
      clearTOC();
      const ul=document.createElement('ul');
      (toc||[]).forEach(item=>{
        const li=document.createElement('li');
        const a=document.createElement('a');
        a.textContent=(item.label||'').trim()||'(untitled)';
        a.href='#';
        a.onclick=(e)=>{ e.preventDefault(); rendition.display(item.href); };
        li.appendChild(a);
        if(item.subitems?.length){
          const sub=document.createElement('ul');
          item.subitems.forEach(s=>{
            const sli=document.createElement('li');
            const sa=document.createElement('a');
            sa.textContent=(s.label||'').trim()||'(untitled)';
            sa.href='#';
            sa.onclick=(e)=>{ e.preventDefault(); rendition.display(s.href); };
            sli.appendChild(sa); sub.appendChild(sli);
          });
          li.appendChild(sub);
        }
        ul.appendChild(li);
      });
      tocEl.appendChild(ul);
    }

    function wirePaging(){
      prevBtn.onclick=()=>rendition.prev();
      nextBtn.onclick=()=>rendition.next();

      // Remove any previously registered keydown handler to prevent stacking
      if(_keyHandler) document.removeEventListener('keydown', _keyHandler);

      _keyHandler=(e)=>{
        if(viewerEl.style.display!=='block') return;

        let handled = false;
        switch(e.key){
          case 'ArrowLeft':
          case 'PageUp':
            rendition.prev(); handled = true; break;

          case 'ArrowRight':
          case 'PageDown':
          case ' ':
            rendition.next(); handled = true; break;

          case 't':
          case 'T':
            tocVisible=!tocVisible; updateTocVisibility(); handled = true; break;

          case 'b':
          case 'B':
            bgIdx=(bgIdx+1)%bgModes.length;
            applyBackground(bgModes[bgIdx]);
            applyFontSize();
            handled = true;
            break;

          case '+':              // plus on some layouts
            fontSize=Math.min(fontSize+10,200); applyFontSize(); handled = true; break;
          case '=':              // Shift+= also gives '+'
            if (e.shiftKey) { fontSize=Math.min(fontSize+10,200); applyFontSize(); handled = true; }
            break;
          case '-':
          case '_':
            fontSize=Math.max(fontSize-10,50); applyFontSize(); handled = true; break;
        }

        if (handled) {
          e.preventDefault();
          e.stopPropagation();
        }
      };

      document.addEventListener('keydown', _keyHandler);
    }

    function applyFontSize(){
      localStorage.setItem('epub_fontSize', fontSize);
      try { rendition.themes.fontSize(fontSize+'%'); } catch {}
      try {
        rendition.getContents().forEach(c=>{
          c.addStylesheetRules({
            'html, body, p, div, span': {
              'font-size': fontSize+'% !important',
              'line-height': '1.6'
            }
          });
        });
      } catch {}
    }
    fontPlus.onclick=()=>{ fontSize=Math.min(fontSize+10,200); applyFontSize(); };
    fontMinus.onclick=()=>{ fontSize=Math.max(fontSize-10,50);  applyFontSize(); };

    // Background cycle button
    bgToggle.onclick=()=>{
      if(!rendition) return;
      bgIdx=(bgIdx+1)%bgModes.length;
      applyBackground(bgModes[bgIdx]);
      applyFontSize();
    };

    // TOC toggle (click)
    function updateTocVisibility(){
      if(!rendition) return;
      if(tocVisible){ tocEl.classList.remove('hidden'); tocToggle.textContent='Hide TOC'; }
      else { tocEl.classList.add('hidden'); tocToggle.textContent='Show TOC'; }
      requestAnimationFrame(()=>rendition.resize());
    }
    tocToggle.onclick=()=>{ tocVisible=!tocVisible; updateTocVisibility(); };

    toLibraryBtn.onclick=async()=>{ await unloadBook(); renderLibrary(); };

    async function unloadBook(){
      if(_keyHandler){ document.removeEventListener('keydown', _keyHandler); _keyHandler=null; }
      if(_resizeHandler){ window.removeEventListener('resize', _resizeHandler); _resizeHandler=null; }
      try{ await rendition?.destroy(); }catch{}
      try{ await book?.destroy(); }catch{}
      book=null; rendition=null; locations=null;
      controls.style.display='none';
      document.getElementById('sidebar').style.display='flex';
    }

    async function openBookFromDB(id){
      await openDB();
      const rec=await idbGet(id);
      if(!rec) return alert('Book not found.');
      currentBookId=id;

      // Unload before showing controls (prevents buttons from disappearing)
      await unloadBook();

      // Switch UI to Reader
      document.body.classList.remove('mode-library');
      libraryEl.style.display='none';
      collectionsView.style.display='none';
      document.getElementById('sidebar').style.display='none';
      viewerEl.style.display='block';
      controls.style.display='flex';
      toLibraryBtn.style.display='inline-block';
      searchBox.style.display='inline-block';
      importBtn.style.display='none';
      progressBar.style.display='block';
      progressLabel.style.display='block';
      progressFill.style.width='0%';
      progressLabel.textContent='';

      // Load the book
      const buf=await rec.bufBlob.arrayBuffer();
      book=ePub(buf,{openAs:'binary'}); await book.ready;

      rendition=book.renderTo('rendition',{ width:'100%', height:'100%', manager:'continuous', flow:'paginated', spread:'none' });
      await rendition.display(rec.lastCfi || undefined);

      rendition.themes.register('reader-base',{
        'html, body': { margin:0, padding:0 },
        'img, svg': { maxWidth:'100%', height:'auto' }
      });
      rendition.themes.select('reader-base');

      // Background on new sections
      rendition.hooks.content.register((contents)=>{ setBackgroundForContents(contents, bgModes[bgIdx]||'paper'); });

      // Apply persisted preferences (font size + background)
      applyBackground(bgModes[bgIdx]); applyFontSize();

      tocVisible=true; updateTocVisibility();
      wirePaging();
      addOrEnsureScrollToggle();

      // Metadata
      const md=await book.loaded.metadata.catch(()=>({}));
      metaEl.textContent=`${md?.title || rec.title || 'Untitled'} — ${md?.creator || rec.author || ''}`.trim();

      // TOC
      const nav=await book.loaded.navigation.catch(()=>({toc:[]}));
      buildTOC(nav.toc||[]);

      // Progress + persist CFI
      try{ locations=await book.locations.generate(1000); }catch{}
      rendition.on('relocated', async (loc)=>{
        try{
          const pct=book.locations?.percentageFromCfi?.(loc.start.cfi) || 0;
          const pctRounded=Math.round(pct*100);
          document.title=`${pctRounded}% · ${md?.title || rec.title || 'EPUB Reader'}`;
          // Update progress bar
          progressFill.style.width=`${pctRounded}%`;
          progressLabel.textContent=`${pctRounded}%`;
          const r=await idbGet(currentBookId);
          if(r){ r.lastCfi=loc.start.cfi; await idbAddBook(r); }
        }catch{}
      });

      // Remove any previously registered resize handler to prevent stacking
      if(_resizeHandler) window.removeEventListener('resize', _resizeHandler);
      _resizeHandler=()=>rendition.resize();
      window.addEventListener('resize', _resizeHandler);

      // Search — trigger on Enter key press
      searchBox.onkeydown=async(e)=>{
        if(e.key!=='Enter') return;
        const q=searchBox.value.trim(); if(!q) return;
        flashStatus('Searching…');
        try{
          const results=await Promise.all(
            book.spine.spineItems.map(i=>i.load(book.load.bind(book)).then(()=>i.find(q)).finally(()=>i.unload()))
          );
          const flat=results.flat();
          if(flat.length){ await rendition.display(flat[0].cfi); flashStatus(`${flat.length} match${flat.length>1?'es':''} found`); }
          else flashStatus('No matches found');
        }catch(e){ console.error(e); flashStatus('Search error'); }
      };

      flashStatus('Opened from Library');
    }

    function addOrEnsureScrollToggle(){
      let btn=document.getElementById('scrollToggle');
      if(!btn){
        btn=document.createElement('button');
        btn.id='scrollToggle';
        btn.textContent='Scroll mode';
        btn.className='btn-teal';
        controls.appendChild(btn);
      }
      let isScrolled=false;
      btn.onclick=async()=>{
        isScrolled=!isScrolled;
        btn.textContent=isScrolled?'Paginated mode':'Scroll mode';
        const loc=rendition.currentLocation()?.start?.cfi;
        await rendition.flow(isScrolled?'scrolled-doc':'paginated');
        await rendition.display(loc);
        applyFontSize();
        applyBackground(bgModes[bgIdx]||'paper');
        updateTocVisibility();
      };
    }

    /********** Boot **********/
    window.addEventListener('error', e=>console.error('Error:', e.message));
    window.addEventListener('unhandledrejection', e=>console.error('Promise rejection:', e.reason));

    (async function init(){
      try{
        await openDB();
        await renderLibrary();
      }catch(err){
        console.error('Init failed:', err);
        document.body.innerHTML=`<div style="padding:2rem;font-family:system-ui;color:#b91c1c;">
          <h2>⚠️ Failed to initialise app</h2>
          <p>${err?.message||err}</p>
          <p>Try opening the browser console for more details.</p>
        </div>`;
      }
    })();
  </script>
</body>
</html>
