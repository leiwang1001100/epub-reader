<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EPUB Reader + Library</title>

  <link rel="stylesheet" href="styles.css">

  <!-- Needed for file:// -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3/dist/epub.min.js"></script>
</head>
<body class="mode-library">
  <!-- File input off-screen but enabled -->
  <input id="importInput" type="file" accept=".epub" multiple />

  <!-- Sidebar -->
  <nav id="sidebar" aria-label="Main navigation">
    <button class="sidebar-btn active" id="sideHome" title="All Books" aria-label="All Books">🏠</button>
    <button class="sidebar-btn" id="sideCollections" title="Collections" aria-label="Collections">📁</button>
  </nav>

  <header>
    <button id="toLibrary" class="btn-green" style="display:none;">← Library</button>
    <input id="searchBox" placeholder="Search text…" style="display:none;" />
    <span id="meta" class="small"></span>
    <span class="spacer"></span>
    <span id="status" class="small-badge" role="status" aria-live="polite"></span>
  </header>

  <!-- Library -->
  <div id="library">
    <div id="libToolbar">
      <button id="importBtn" class="btn-purple">Import EPUBs</button>
      <input id="libSearch" type="search" placeholder="🔍 Search title / author…" aria-label="Search books by title or author" />
      <select id="libColFilter" class="filter-select" aria-label="Filter by collection">
        <option value="">📁 All Collections</option>
      </select>
      <select id="libSort" class="filter-select" aria-label="Sort books">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="title-az">Title A–Z</option>
        <option value="title-za">Title Z–A</option>
      </select>
      <span class="spacer"></span>
      <div class="page-controls">
        <span class="small">Show:</span>
        <button class="page-size-btn active" data-size="20">20</button>
        <button class="page-size-btn" data-size="50">50</button>
        <button class="page-size-btn" data-size="100">100</button>
        <span class="page-divider"></span>
        <button id="libPrevBtn" class="page-nav-btn" aria-label="Previous page">&#8249;</button>
        <span id="libPageInfo" class="small" aria-live="polite">Page 1 of 1</span>
        <button id="libNextBtn" class="page-nav-btn" aria-label="Next page">&#8250;</button>
      </div>
      <span class="small-badge" title="App version">v1.5.0</span>
    </div>
    <p id="libHint" class="small" style="margin:0 0 8px 0;color:var(--muted);"></p>
    <hr class="toolbar-divider" />
    <div id="grid"></div>
  </div>

  <!-- Collections view -->
  <div id="collectionsView">
    <div id="collectionsToolbar">
      <button id="newCollectionBtn" class="btn-green">＋ New Collection</button>
      <span class="small" id="collectionsHint">Organise your books into collections.</span>
      <span class="spacer"></span>
      <div class="page-controls">
        <span class="small">Show:</span>
        <button class="col-size-btn active" data-size="20">20</button>
        <button class="col-size-btn" data-size="50">50</button>
        <button class="col-size-btn" data-size="100">100</button>
        <span class="page-divider"></span>
        <button id="colPrevBtn" class="page-nav-btn" aria-label="Previous page">&#8249;</button>
        <span id="colPageInfo" class="small" aria-live="polite">Page 1 of 1</span>
        <button id="colNextBtn" class="page-nav-btn" aria-label="Next page">&#8250;</button>
      </div>
    </div>
    <hr class="toolbar-divider" />
    <div id="collectionsGrid"></div>
    <!-- Collection detail (books inside a collection) -->
    <div id="collectionDetail" style="display:none;">
      <div id="detailToolbar" style="display:flex;gap:8px;align-items:center;margin-bottom:12px;">
        <button id="backToCollections" class="btn-blue">← Collections</button>
        <span id="detailTitle" style="font-weight:700;font-size:18px;"></span>
        <span class="spacer"></span>
      </div>
      <div id="detailGrid" class="grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;"></div>
    </div>
  </div>

  <!-- Progress bar -->
  <div id="progressBar"><div id="progressFill"></div></div>
  <span id="progressLabel"></span>

  <!-- Reader -->
  <div id="viewer">
    <div id="split">
      <nav id="toc"></nav>
      <div id="rendition"></div>
    </div>
  </div>

  <div id="controls" role="toolbar" aria-label="Reader controls">
    <button id="prev" class="btn-blue" aria-label="Previous page">⬅️ Prev</button>
    <button id="next" class="btn-blue" aria-label="Next page">Next ➡️</button>
    <button id="tocToggle" class="btn-green" aria-label="Toggle table of contents">Hide TOC</button>
    <button id="fontMinus" class="btn-orange" aria-label="Decrease font size">A−</button>
    <button id="fontPlus" class="btn-orange" aria-label="Increase font size">A+</button>
    <button id="bgToggle" class="btn-purple" aria-label="Change background theme">Background: Paper</button>
    <!-- scroll toggle appended if missing -->
  </div>

  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/library.js"></script>
  <script src="js/collections.js"></script>
  <script src="js/reader.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
